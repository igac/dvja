name: SAST analysis with Snyk

on:
  workflow_dispatch:

jobs:
  sast-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build Maven project
        run: mvn -B clean package -DskipTests

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk Code (human-readable + JSON)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk code test \
            --severity-threshold=high \
            --json-file-output=snyk-code.json

      - name: Add Snyk Code summary to job summary
        if: always()
        shell: bash
        run: |
          echo "## Snyk Code summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ ! -f snyk-code.json ]; then
            echo "No Snyk Code JSON report was generated." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Human-readable SAST findings from Snyk Code." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          python3 - <<'PY'
          import json
          from collections import Counter

          with open("snyk-code.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          runs = data if isinstance(data, list) else [data]
          results = []
          for run in runs:
              results.extend(run.get("runs", [{}])[0].get("results", []))

          levels = Counter()
          for r in results:
              level = r.get("level", "unknown")
              levels[level] += 1

          with open("/tmp/snyk-summary.md", "w", encoding="utf-8") as out:
              total = len(results)
              out.write(f"Total findings: **{total}**\n\n")
              if total:
                  out.write(f"- Error: **{levels.get('error', 0)}**\n")
                  out.write(f"- Warning: **{levels.get('warning', 0)}**\n")
                  out.write(f"- Note: **{levels.get('note', 0)}**\n\n")
                  out.write("| Severity | Rule | File |\n")
                  out.write("|---|---|---|\n")
                  for r in results[:20]:
                      rule = r.get("ruleId", "unknown")
                      level = r.get("level", "unknown")
                      locs = r.get("locations", [])
                      file_path = "unknown"
                      if locs:
                          file_path = locs[0].get("physicalLocation", {}).get("artifactLocation", {}).get("uri", "unknown")
                      out.write(f"| {level} | `{rule}` | `{file_path}` |\n")
              else:
                  out.write("No findings reported by Snyk Code.\n")
          PY

          cat /tmp/snyk-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Run Snyk Code (SARIF)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk code test \
            --severity-threshold=high \
            --sarif-file-output=snyk-code.sarif

      - name: Upload Snyk Code SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      - name: Upload Snyk reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-reports
          path: |
            snyk-code.json
            snyk-code.sarif
